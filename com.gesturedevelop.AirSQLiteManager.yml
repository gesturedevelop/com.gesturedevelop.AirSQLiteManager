app-id: com.gesturedevelop.AirSQLiteManager
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: AirSQLiteManager
finish-args:
  - --share=ipc
  - --socket=x11
modules:
  - name: AirSQLiteManager
    buildsystem: simple
    build-commands:
      - install -Dm644 "snap/gui/airsqlitemanager.desktop" "/app/share/applications/com.gesturedevelop.AirSQLiteManager.desktop"
      - install -Dm644 "snap/gui/airsqlitemanager.png" "/app/share/icons/hicolor/128x128/apps/com.gesturedevelop.AirSQLiteManager.png"
      - install -Dm644 "snap/gui/com.gesturedevelop.AirSQLiteManager.appdata.xml" "/app/share/metainfo/com.gesturedevelop.AirSQLiteManager.appdata.xml"
      - mkdir -p /app/lib/AirSQLiteManager
      - cp -ra . /app/lib/AirSQLiteManager/
      - rm -rf /app/lib/AirSQLiteManager/snap
      - mkdir -p /app/bin
      - ln -s /app/lib/AirSQLiteManager/AirSQLiteManager /app/bin/AirSQLiteManager
    sources:
      - type: archive
        url: https://airsqlitemanager.gesturedevelop.com/AirSQLiteManager-0.9.8-x86-64.tar.xz
        sha256: 1b27d10f38b40365201aeb1964a1ff2d7374b331c41ea13bf6a4441a032ec3b2
        only-arches:
          - x86_64
      - type: archive
        url: https://airsqlitemanager.gesturedevelop.com/AirSQLiteManager-0.9.8-arm64.tar.xz
        sha256: 7311956f023f63ec7e80260bf88bf01aea1bbe36587ee70f5922b64aaa288dff
        only-arches:
          - aarch64
